services:
  db:
    image: postgis/postgis:16-3.4
    container_name: sig_microbuses_db
    environment:
      POSTGRES_DB: sig_microbuses
      POSTGRES_USER: sig_user
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sig_user -d sig_microbuses"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sig_microbuses_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://sig_user:change_me@db:5432/sig_microbuses
      HOST: 0.0.0.0
      PORT: 8000
      WEB_CONCURRENCY: 1
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
